<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="img-section">
        <img id="man-image" src="img/adam-neumann-vzEeVwUgTmI-unsplash.jpg" alt="image">
        <div class="logo-section">
            <img src="img/odin-lined.png" alt="" id="logo">
            <p id="logo-name">hyper_21</p>
        </div>
    </div>
    <div id="main-section">
        <div id="description">
            <p>This is not a real online service! Lorem ipsum dolor sit amet consectetur, adipisicing elit. Necessitatibus, commodi! Sign up now to get started.</p>
            <p>You know you want to.</p>
        </div>
        <h2>Let's do this!</h2>
        <div class="form">
            <form action="">
                <div class="inputs">
                        <div class="first-col">
                        <label for="first-name">First Name*</label>
                        <input type="text" id="first-name" name="first-name" required>
                        <label for="email">Email*</label>
                        <input type="email" id="email" name="email" required>
                        <label for="pw">Password*</label>
                        <input type="password" id="pw" name="pw" required>
                    </div>
                    <div class="second-col">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" name="last-name">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone-number">
                        <label for="Cpw">Confirm Password*</label>
                        <input type="password" id="Cpw" name="Cpw" required>
                    </div>
                </div>
                <button id="create">Create Account</button>
            </form>
        </div>
        <p id="log">Already have an account? <a href="">Log in</a></p>
    </div>
</body>
</html>
